<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized leaf/flame representing spirit + life, with book element -->
  <g transform="translate(4,4)">
    <!-- Base rounded square -->
    <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#lg)"/>
    <!-- Open book/sunrise stylized shape -->
    <path d="M16,44 C16,28 22,18 28,14 C30,12 32,14 34,16 L36,18 C38,14 40,12 42,14 C48,18 54,28 54,44 C50,40 44,36 36,36 C28,36 22,40 16,44Z" fill="white" opacity="0.95"/>
    <!-- Pages -->
    <path d="M28,18 L28,44 C28,44 32,40 36,40 C40,40 44,44 44,44 L44,18" fill="none" stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Gold accent dot -->
    <circle cx="36" cy="34" r="3" fill="url(#ag)"/>
  </g>
  <!-- Text -->
  <g transform="translate(88,12)">
    <text x="0" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#064E3B" letter-spacing="-0.5">SOLCEF</text>
    <text x="0" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#78716C" letter-spacing="3.5" text-transform="uppercase">EDUCATION FOR HAITI</text>
  </g>
</svg>
